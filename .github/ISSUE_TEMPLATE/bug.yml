name: Bug report
description: Report a reproducible problem in DittoJs or a generated project.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Search existing issues first. Do not disclose security vulnerabilities here; use the private process in SECURITY.md.
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Web builder
        - Resolver or schema
        - Catalog or manifest
        - Generator
        - Generated project
        - Generation API
        - Documentation or contributor tooling
        - Unsure
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the observed behavior and why it is a problem.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide exact selections, recipe JSON, commands, or a minimal repository.
      placeholder: |
        1. Start from...
        2. Select...
        3. Run...
        4. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: DittoJs revision
      description: Commit SHA, tag, or branch.
      placeholder: main at abc1234
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Node.js, pnpm, and browser versions where relevant.
      render: shell
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Remove secrets and personal data. Logs are automatically formatted.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: This is not a security vulnerability.
          required: true
        - label: I removed secrets and personal data from this report.
          required: true
        - label: I agree to follow the Code of Conduct.
          required: true
