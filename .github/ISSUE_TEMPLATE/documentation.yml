name: Documentation improvement
description: Report missing, incorrect, or confusing documentation.
title: "docs: "
labels:
  - documentation
body:
  - type: input
    id: location
    attributes:
      label: Documentation location
      placeholder: README.md, docs/RESOLVER_SPEC.md, generated README, or URL
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is unclear or incorrect?
    validations:
      required: true
  - type: textarea
    id: improvement
    attributes:
      label: Suggested improvement
  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched existing issues.
          required: true
        - label: I agree to follow the Code of Conduct.
          required: true
