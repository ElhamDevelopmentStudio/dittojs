version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 10
    groups:
      development-tooling:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-patches:
        dependency-type: production
        update-types:
          - patch
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
